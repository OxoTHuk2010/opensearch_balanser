name: ci

on:
  push:
  pull_request:

jobs:
  docs-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Docs gate
        run: go run ./cmd/docs-gate

  test:
    runs-on: ubuntu-latest
    needs: docs-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...
